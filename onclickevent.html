<!DOCTYPE html>
<html>
<head>
    <title>Mouse Events</title>
</head>
<body>

<div id="box">
    Try Me
</div>

<button onclick="alert('Clicked')">Click</button>
<br><br>

<button ondblclick="alert('Double Clicked')">Double Click</button>
<br><br>

<button onmouseover="alert('Mouse Over')">Mouse Over</button>
<br><br>

<button onmouseout="alert('Mouse Out')">Mouse Out</button>
<br><br>

<button onmousedown="alert('Mouse Down')">Mouse Down</button>
<br><br>

<button onmouseup="alert('Mouse Up')">Mouse Up</button>
<br><br>

<button onmousemove="console.log('Moving')">Mouse Move</button>

</body>
</html>
